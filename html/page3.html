      <!-- button -->

        data-bs-target="#collapse" aria-controls="collapse" 
        aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button> 

      <!-- makes navbar collapsible -->

        <!-- links to other pages -->

            <a class="nav-link" href="page2.html" id="pg2">Plans & Achievements</a>

        </div>
      </div>

    </div>
</nav>


<br><br><br><br><br><!-- line breaks -->

<!-- form -->
<form name="form" id="form" action="#" method="post" class="container">

  
  <!-- creates horizontal row of elements -->
  <div class="row">

      <!-- The 'col-md-6' ensures div takes up half the available width, and the 'mx-auto' centers it horizontally. -->
      <div class="col-md-6 mx-auto">

        <!-- move text to center and change font weight of h1 to bold -->
        <header class="text-center">
          <h1 class="fw-bold">Submit Personal Wishes/Messages</h1>    
        </header>

        <br><!-- line break -->

        <!-- move text to center -->
        <div class="text-center">
          
          <!-- radios -->
          <div class="form-check form-check-inline">
          <input type="radio" class="form-check-input" id="wishes" name="wishes/msgs" value="wishes" checked>
          <label class="form-check-label" for="wishes">Wishes</label>
          </div>
          <div class="form-check form-check-inline">
          <input type="radio" class="form-check-input" id="msgs" name="wishes/msgs" value="msgs">
          <label class="form-check-label" for="msgs">Messages</label>
          </div>

        </div>
          
          
        <!-- text -->
        <label for = "userName">Name</label><div id="error"></div>         
        <input type ="text" class="form-control" id="userName" placeholder="Enter your full name" name="userName">

        <br> <!-- line break -->

        <!-- text -->
        <label for = "email">Email</label>
        <input type ="text" class="form-control" id="email" placeholder="Enter your email" name="email">

        <br> <!-- line break -->

        <!-- text area -->
        <label for="text-area" class="form-label">Personal Messages/Wishes</label>
        <textarea class="form-control" id="text-area" rows="5" placeholder="Enter your Messages/Wishes"></textarea>

        <br><br> <!-- line breaks -->

        <!-- flex container, moved text to center and justified content to center -->
        <div class="form-check d-flex text-center justify-content-center">
            <!-- checkbox -->
            <input class="form-check-input" type="checkbox" id="tncs" name="tncs" value="tncs"> <br>
            <!-- added padding of 2px to the left side -->
            <label class="form-check-label ps-2">I allow SP to publish my Messages/Wishes on their Social Media.</label> 
        </div>

        <br><br> <!-- line breaks -->
        
        <!-- flex container and justified content to center -->
        <div class="d-flex justify-content-center">

          <!-- added left and right margin to the two buttons -->
          <button type="submit" class="btn btn-primary mx-2">Submit</button>
          <button type="reset" class="btn btn-primary mx-2">Reset</button>

        </div>

    </div>
  </div>
</form>

<br><br> <!-- line breaks -->

<footer class="col-md-12">
  
  <br>

      <a href="https://www.facebook.com/singaporepolytechnic" target=" "><i class="bi bi-facebook"></i></a>
   
    </p>
  
      <hr class="bottomline"> <!-- Horizontal Rule -->
    
    <br> <!-- line break -->
  
    <div class="info">
      <p><i class="bi bi-geo-fill"></i>500 Dover Road Singapore 139651</p>
      <p><i class="bi bi-telephone-fill"></i>6775 1133</p>
      <p><i class="bi bi-envelope-fill"></i>contactus@sp.edu.sg</p>
    </div>
  
  <br>  <!-- line break -->
  
</footer>
